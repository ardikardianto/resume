name: Update site metrics

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update public scholarly metrics
        run: python scripts/update-site-metrics.py

      - name: Commit changed metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update public scholarly metrics"
          file_pattern: index.html
