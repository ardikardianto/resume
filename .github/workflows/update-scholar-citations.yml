name: Update Google Scholar citations

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Google Scholar citation count
        run: python scripts/update-scholar-citations.py

      - name: Commit changed citation count
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Google Scholar citation count"
          file_pattern: index.html
