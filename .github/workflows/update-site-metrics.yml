name: Update site metrics

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Update public scholarly metrics
        run: python scripts/update-site-metrics.py

      - name: Install PDF update dependencies
        run: python -m pip install pypdf reportlab pymupdf

      - name: Update resume PDF metrics
        run: python scripts/update-resume-pdf-metrics.py

      - name: Render resume preview image
        run: python scripts/render-resume-preview.py

      - name: Commit changed metrics
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update public scholarly metrics"
          file_pattern: index.html "Ardianto's Resume.pdf" assets/resume-preview.png
